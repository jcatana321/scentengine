    const SparklesIcon = ({size,color}) => <Icon size={size} color={color} d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3zM5 17l.75 2.25L8 20l-2.25.75L5 23l-.75-2.25L2 20l2.25-.75L5 17zM19 3l.5 1.5L21 5l-1.5.5L19 7l-.5-1.5L17 5l1.5-.5L19 3z"/>;
    const AlertIcon = ({size,color}) => <Icon size={size} color={color} d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"/>;
    const FlaskIcon = ({size,color}) => <Icon size={size} color={color} d="M9 3h6M9 3v7l-4 9h14L15 10V3M9 3h6"/>;
    const BeakerIcon = ({size,color}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15M8 3v8.5L3 21h18l-5-9.5V3"/></svg>;

    // ── FamilyChip ────────────────────────────────────────────────────────────
    function FamilyChip({ family }) {
      const c = familyColor(family);
      return (
        <span style={{ fontSize:10, fontWeight:600, letterSpacing:"0.04em", background:c.bg, color:c.text, borderRadius:20, padding:"2px 7px", display:"inline-flex", alignItems:"center", gap:4 }}>
          <span style={{ width:5, height:5, borderRadius:"50%", background:c.dot }} />
          {family}
        </span>
      );
    }

    // ── StrengthBar ───────────────────────────────────────────────────────────
    function StrengthBar({ value, onChange, ifraLimit }) {
      const pct = STRENGTHS[value].pct;
      const overIfra = ifraLimit !== null && pct > ifraLimit;
      const fillColor = overIfra ? "#EF4444" : STRENGTHS[value].color;
      const fillPct = (value / 4) * 100;
      return (
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
            <span style={{ fontSize:11, fontWeight:600, color: overIfra?"#EF4444":"#374151", letterSpacing:"0.05em", textTransform:"uppercase" }}>
              {STRENGTHS[value].label}
            </span>
            <span style={{ fontSize:10, color: overIfra?"#EF4444":"#9CA3AF", display:"flex", alignItems:"center", gap:3 }}>
              {overIfra && <AlertIcon size={9} color="#EF4444"/>}
              ~{pct}%{ifraLimit !== null && ` · IFRA ${ifraLimit}%`}
            </span>
          </div>
          <div style={{ position:"relative", height:6, borderRadius:999, background:"#F1F5F9", cursor:"pointer", overflow:"hidden" }}
            onClick={(e) => { const r=e.currentTarget.getBoundingClientRect(); onChange(Math.min(4,Math.max(0,Math.round((e.clientX-r.left)/r.width*4)))); }}>
            <div style={{ height:"100%", width:`${fillPct}%`, borderRadius:999, background:fillColor, transition:"width 0.15s ease, background 0.15s ease" }} />
            {[1,2,3].map(i => <div key={i} style={{ position:"absolute", top:0, left:`${(i/4)*100}%`, width:1, height:"100%", background:"white", opacity:0.8 }} />)}
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:3 }}>
            {STRENGTHS.map((s,i) => (
              <button key={i} onClick={() => onChange(i)} style={{ fontSize:9, color: i===value?"#1E293B":"#CBD5E1", background:"none", border:"none", cursor:"pointer", padding:0, fontWeight: i===value?700:400, letterSpacing:"0.03em" }}>
                {s.label[0]}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ── ZoneBadge ─────────────────────────────────────────────────────────────
    function ZoneBadge({ zone, onChange }) {
      const [open, setOpen] = useState(false);
      return (
        <div style={{ position:"relative" }}>
          <button onClick={() => setOpen(!open)} style={{ display:"flex", alignItems:"center", gap:4, background:ZONE_COLORS[zone], border:"none", borderRadius:20, padding:"3px 8px", cursor:"pointer", fontSize:11, fontWeight:600, color:ZONE_DOT[zone] }}>
            <span style={{ width:6, height:6, borderRadius:"50%", background:ZONE_DOT[zone] }} />
            {ZONE_LABELS[zone]}
            <ChevronIcon size={9} color={ZONE_DOT[zone]}/>
          </button>
          {open && (
            <div style={{ position:"absolute", top:"calc(100% + 4px)", left:0, zIndex:50, background:"white", borderRadius:8, boxShadow:"0 4px 20px rgba(0,0,0,0.12)", border:"1px solid #E2E8F0", overflow:"hidden", minWidth:80 }}>
              {ZONES.map(z => (
                <button key={z} onClick={() => { onChange(z); setOpen(false); }} style={{ display:"flex", alignItems:"center", gap:6, width:"100%", padding:"7px 12px", background: z===zone?"#F8FAFC":"white", border:"none", cursor:"pointer", fontSize:11, fontWeight: z===zone?700:400, color:ZONE_DOT[z], textAlign:"left" }}>
                  <span style={{ width:6, height:6, borderRadius:"50%", background:ZONE_DOT[z] }} />
                  {ZONE_LABELS[z]}
                  {z===zone && <CheckIcon size={10} color={ZONE_DOT[z]}/>}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── CompositionSummary ────────────────────────────────────────────────────
    function CompositionSummary({ selected }) {
      const byFamily = useMemo(() => {
        const map = {};
        selected.forEach(i => { const w=STRENGTHS[i.strength].pct; map[i.family]=(map[i.family]||0)+w; });
        const total = Object.values(map).reduce((a,b)=>a+b,0)||1;
        return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([fam,w])=>({ fam, pct:Math.round((w/total)*100) }));
      }, [selected]);
      const byZone = useMemo(() => {
        const map={top:0,heart:0,base:0};
        selected.forEach(i=>{map[i.zone]+=STRENGTHS[i.strength].pct;});
        const total=Object.values(map).reduce((a,b)=>a+b,0)||1;
        return Object.entries(map).map(([z,w])=>({z,pct:Math.round((w/total)*100)}));
      }, [selected]);
      if (!selected.length) return null;
      return (
        <div style={{ padding:"0 20px 16px" }}>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#94A3B8", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:5 }}>Structure</div>
            <div style={{ display:"flex", height:5, borderRadius:999, overflow:"hidden", gap:1 }}>
              {byZone.map(({z,pct})=>pct>0&&<div key={z} style={{ flex:pct, background:ZONE_DOT[z], borderRadius:999 }} title={`${ZONE_LABELS[z]}: ${pct}%`}/>)}
            </div>
            <div style={{ display:"flex", gap:10, marginTop:4 }}>
              {byZone.map(({z,pct})=><span key={z} style={{ fontSize:9, color:ZONE_DOT[z], fontWeight:600 }}>{ZONE_LABELS[z]} {pct}%</span>)}
            </div>
          </div>
          <div style={{ fontSize:10, fontWeight:700, color:"#94A3B8", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:6 }}>Olfactive profile</div>
          <div style={{ display:"flex", gap:2, height:20, borderRadius:6, overflow:"hidden" }}>
            {byFamily.map(({fam,pct})=><div key={fam} style={{ flex:pct, background:familyColor(fam).dot, opacity:0.85 }} title={`${fam}: ${pct}%`}/>)}
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:"4px 8px", marginTop:5 }}>
            {byFamily.slice(0,5).map(({fam,pct})=><span key={fam} style={{ fontSize:9, color:familyColor(fam).dot, fontWeight:600 }}>{fam} {pct}%</span>)}
          </div>
        </div>
      );
    }

    // ── ScentProfile (right panel) ────────────────────────────────────────────
    function ScentProfile({ selected }) {
      const byFamily = useMemo(() => {
        const map = {};
        selected.forEach(i => { const w=STRENGTHS[i.strength].pct; if(!map[i.family]) map[i.family]={total:0,items:[]}; map[i.family].total+=w; map[i.family].items.push(i); });
        return Object.entries(map).sort((a,b)=>b[1].total-a[1].total).map(([fam,{total,items}])=>({fam,total,items}));
      }, [selected]);
      const grandTotal = byFamily.reduce((a,b)=>a+b.total,0)||1;
      const tiles = useMemo(() => selected.slice().sort((a,b)=>b.strength-a.strength).map(i=>({ ...i, size:[24,32,44,60,80][i.strength], color:familyColor(i.family).dot, bg:familyColor(i.family).bg })), [selected]);
      return (
        <div style={{ width:220, borderLeft:"1px solid #EEF0F4", background:"white", display:"flex", flexDirection:"column", flexShrink:0 }}>
          <div style={{ padding:"16px 16px 10px", borderBottom:"1px solid #EEF0F4" }}>
            <div style={{ fontSize:11, fontWeight:700, color:"#94A3B8", letterSpacing:"0.08em", textTransform:"uppercase" }}>Scent Profile</div>
          </div>
          {!selected.length ? (
            <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", opacity:0.35, gap:8, padding:20 }}>
              <FlaskIcon size={28} color="#94A3B8"/>
              <div style={{ fontSize:11, color:"#94A3B8", textAlign:"center", lineHeight:1.4 }}>Add materials to see your scent profile</div>
            </div>
          ) : (
            <div style={{ flex:1, overflowY:"auto", padding:"14px 14px 20px" }}>
              <div style={{ display:"flex", flexWrap:"wrap", gap:4, padding:10, borderRadius:12, background:"#F8F9FB", marginBottom:16, minHeight:80 }}>
                {tiles.map(tile=>(
                  <div key={tile.id} title={`${tile.name} · ${STRENGTHS[tile.strength].label}`} style={{ width:tile.size, height:tile.size, borderRadius:tile.size>44?10:6, background:tile.color, opacity:0.75+(tile.strength*0.05), transition:"all 0.2s", flexShrink:0 }}/>
                ))}
              </div>
              <div style={{ fontSize:10, fontWeight:700, color:"#94A3B8", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:10 }}>By Family</div>
              {byFamily.map(({fam,total,items})=>{
                const pct=Math.round((total/grandTotal)*100), c=familyColor(fam);
                return (
                  <div key={fam} style={{ marginBottom:10 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:3 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                        <span style={{ width:7, height:7, borderRadius:"50%", background:c.dot, flexShrink:0 }}/>
                        <span style={{ fontSize:11, fontWeight:600, color:c.text }}>{fam}</span>
                      </div>
                      <span style={{ fontSize:10, color:"#94A3B8", fontWeight:600 }}>{pct}%</span>
                    </div>
                    <div style={{ height:4, borderRadius:999, background:"#F1F5F9", overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${pct}%`, borderRadius:999, background:c.dot, opacity:0.7, transition:"width 0.3s ease" }}/>
                    </div>
                    <div style={{ marginTop:3, display:"flex", flexWrap:"wrap", gap:3 }}>
                      {items.map(i=><span key={i.id} style={{ fontSize:9, color:c.text, background:c.bg, borderRadius:4, padding:"1px 5px", fontWeight:500 }}>{i.name.length>14?i.name.slice(0,13)+"…":i.name}</span>)}
                    </div>
                  </div>
                );
              })}
              {byFamily.length>0&&(
                <div style={{ marginTop:14, padding:"10px 12px", borderRadius:10, background:familyColor(byFamily[0].fam).bg, border:`1px solid ${familyColor(byFamily[0].fam).dot}22` }}>
                  <div style={{ fontSize:9, fontWeight:700, color:"#94A3B8", letterSpacing:"0.06em", textTransform:"uppercase", marginBottom:3 }}>Dominant character</div>
                  <div style={{ fontSize:13, fontWeight:700, color:familyColor(byFamily[0].fam).text, fontFamily:"'Playfair Display', serif", fontStyle:"italic" }}>{byFamily[0].fam}</div>
                  <div style={{ fontSize:10, color:"#94A3B8", marginTop:2 }}>{Math.round((byFamily[0].total/grandTotal)*100)}% of composition</div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function ScentEngine() {
      const [search, setSearch] = useState("");
      const [activeFamily, setActiveFamily] = useState("All");
      const [leftTab, setLeftTab] = useState("materials");
      const [accordSearch, setAccordSearch] = useState("");
      const [selected, setSelected] = useState([]);
      const [buildName, setBuildName] = useState("Untitled Scent");
      const [editingName, setEditingName] = useState(false);
      const [sent, setSent] = useState(false);
      const nameRef = useRef(null);

      useEffect(() => { if (editingName) nameRef.current && nameRef.current.focus(); }, [editingName]);

      const filtered = useMemo(() => INGREDIENTS.filter(i => i.name.toLowerCase().includes(search.toLowerCase()) && (activeFamily==="All"||i.family===activeFamily)).slice(0,60), [search, activeFamily]);

      const addIngredient = (ing) => { if (!selected.find(i=>i.id===ing.id)) setSelected(prev=>[...prev,{...ing,strength:2,zone:"heart"}]); };
      const addAccord = (accord) => {
        const id=`accord-${accord.id}`;
        if (!selected.find(i=>i.id===id)) setSelected(prev=>[...prev,{ id, name:`#${accord.num} ${accord.name}`, family:accord.family, ifra:null, strength:2, zone:"heart", isAccord:true, accordNum:accord.num, descriptor:accord.descriptor }]);
      };
      const updateStrength = (id,val) => setSelected(prev=>prev.map(i=>i.id===id?{...i,strength:val}:i));
      const updateZone = (id,zone) => setSelected(prev=>prev.map(i=>i.id===id?{...i,zone}:i));
      const removeIngredient = (id) => setSelected(prev=>prev.filter(i=>i.id!==id));

      const totalLoad = selected.reduce((acc,i)=>acc+STRENGTHS[i.strength].pct,0);
      const hasIfraWarning = selected.some(i=>i.ifra!==null&&STRENGTHS[i.strength].pct>i.ifra);
      const handleSend = () => { setSent(true); setTimeout(()=>setSent(false),2000); };
      const zoneGroups = useMemo(() => { const g={top:[],heart:[],base:[]}; selected.forEach(i=>g[i.zone].push(i)); return g; }, [selected]);

      const famFilters = ["All","Floral","Woody","Amber","Citrus","Musk","Aromatic","Fruity","Sweet","Molecule"];

      return (
        <div style={{ display:"flex", height:"100vh", fontFamily:"'DM Sans',system-ui,sans-serif", background:"#F8F9FB", overflow:"hidden" }}>

          {/* LEFT */}
          <div style={{ width:280, background:"white", borderRight:"1px solid #EEF0F4", display:"flex", flexDirection:"column", boxShadow:"2px 0 12px rgba(0,0,0,0.04)" }}>
            <div style={{ padding:"20px 16px 12px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                <div style={{ width:28, height:28, borderRadius:8, background:"linear-gradient(135deg,#1E293B,#334155)", display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <BeakerIcon size={14} color="white"/>
                </div>
                <div>
                  <div style={{ fontSize:13, fontWeight:700, color:"#1E293B", letterSpacing:"-0.01em" }}>Scent Engine</div>
                  <div style={{ fontSize:10, color:"#94A3B8", fontWeight:500 }}>Studio Perfumers</div>
                </div>
              </div>
              <div style={{ display:"flex", gap:2, background:"#F1F5F9", borderRadius:8, padding:3, marginBottom:12 }}>
                {[["materials","Materials"],["accords","Accords"]].map(([key,label])=>(
                  <button key={key} onClick={()=>setLeftTab(key)} style={{ flex:1, padding:"5px 0", borderRadius:6, border:"none", cursor:"pointer", fontSize:11, fontWeight:700, background:leftTab===key?"white":"transparent", color:leftTab===key?"#1E293B":"#94A3B8", boxShadow:leftTab===key?"0 1px 4px rgba(0,0,0,0.08)":"none", transition:"all 0.15s" }}>
                    {label}
                  </button>
                ))}
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8, background:"#F8F9FB", border:"1px solid #EEF0F4", borderRadius:10, padding:"8px 12px" }}>
                <SearchIcon size={13} color="#94A3B8"/>
                <input placeholder={leftTab==="materials"?`Search ${INGREDIENTS.length} materials…`:"Search accords…"} value={leftTab==="materials"?search:accordSearch} onChange={e=>leftTab==="materials"?setSearch(e.target.value):setAccordSearch(e.target.value)} style={{ border:"none", outline:"none", background:"none", fontSize:13, color:"#374151", width:"100%" }}/>
                {(leftTab==="materials"?search:accordSearch)&&<button onClick={()=>leftTab==="materials"?setSearch(""):setAccordSearch("")} style={{ background:"none", border:"none", cursor:"pointer", padding:0, color:"#94A3B8" }}><XIcon size={12}/></button>}
              </div>
            </div>

            {leftTab==="materials"&&(
              <>
                <div style={{ paddingLeft:16, paddingRight:8, paddingBottom:10, display:"flex", gap:5, overflowX:"auto", flexShrink:0 }}>
                  {famFilters.map(f=>{ const active=activeFamily===f, c=f==="All"?null:familyColor(f); return (
                    <button key={f} className="fam-chip" onClick={()=>setActiveFamily(f)} style={{ flexShrink:0, fontSize:10, fontWeight:600, padding:"4px 10px", borderRadius:20, cursor:"pointer", border:active?"1px solid transparent":"1px solid #E2E8F0", background:active?(c?c.bg:"#1E293B"):"white", color:active?(c?c.text:"white"):"#6B7280", letterSpacing:"0.03em" }}>
                      {f}
                    </button>
                  );})}
                </div>
                <div style={{ padding:"0 16px 8px", fontSize:10, color:"#94A3B8", fontWeight:500 }}>{filtered.length} materials{filtered.length===60?" (first 60)":""}</div>
                <div style={{ flex:1, overflowY:"auto", padding:"0 8px 16px" }}>
                  {filtered.map(ing=>{ const isAdded=selected.some(i=>i.id===ing.id); return (
                    <div key={ing.id} className="ing-row" onClick={()=>!isAdded&&addIngredient(ing)} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"7px 8px", borderRadius:8, cursor:isAdded?"default":"pointer", background:isAdded?"#F0FDF4":"white", marginBottom:1, opacity:isAdded?0.6:1 }}>
                      <div style={{ minWidth:0 }}>
                        <div style={{ fontSize:12, fontWeight:500, color:"#1E293B", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:180 }}>{ing.name}</div>
                        <div style={{ marginTop:2 }}><FamilyChip family={ing.family}/></div>
                      </div>
                      <button className="add-btn" onClick={e=>{e.stopPropagation();if(!isAdded)addIngredient(ing);}} style={{ flexShrink:0, width:22, height:22, borderRadius:"50%", background:isAdded?"#86EFAC":"#1E293B", border:"none", cursor:isAdded?"default":"pointer", display:"flex", alignItems:"center", justifyContent:"center", opacity:isAdded?1:0, transition:"opacity 0.15s" }}>
                        {isAdded?<CheckIcon size={11} color="white"/>:<PlusIcon size={11} color="white"/>}
                      </button>
                    </div>
                  );})}
                </div>
              </>
            )}

            {leftTab==="accords"&&(
              <div style={{ flex:1, overflowY:"auto", padding:"0 8px 16px" }}>
                <div style={{ padding:"0 8px 8px", fontSize:10, color:"#94A3B8", fontWeight:500 }}>25 house accords</div>
                {ACCORDS.filter(a=>a.name.toLowerCase().includes(accordSearch.toLowerCase())||a.descriptor.toLowerCase().includes(accordSearch.toLowerCase())||a.tags.some(t=>t.toLowerCase().includes(accordSearch.toLowerCase()))).map(accord=>{
                  const isAdded=selected.some(i=>i.id===`accord-${accord.id}`), c=familyColor(accord.family);
                  return (
                    <div key={accord.id} className="ing-row" onClick={()=>!isAdded&&addAccord(accord)} style={{ padding:"9px 10px", borderRadius:10, marginBottom:4, cursor:isAdded?"default":"pointer", background:isAdded?"#F0FDF4":"white", border:`1px solid ${c.dot}22`, borderLeft:`3px solid ${c.dot}`, opacity:isAdded?0.7:1 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:5, marginBottom:2 }}>
                            <span style={{ fontSize:9, fontWeight:800, color:"white", background:c.dot, borderRadius:4, padding:"1px 5px", flexShrink:0 }}>{accord.num}</span>
                            <span style={{ fontSize:12, fontWeight:700, color:"#1E293B", letterSpacing:"-0.01em" }}>{accord.name}</span>
                          </div>
                          <div style={{ fontSize:10, color:"#64748B", lineHeight:1.3, marginBottom:4 }}>{accord.descriptor}</div>
                          <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
                            {accord.tags.map(tag=><span key={tag} style={{ fontSize:9, color:c.text, background:c.bg, borderRadius:4, padding:"1px 5px", fontWeight:600 }}>{tag}</span>)}
                          </div>
                        </div>
                        <button onClick={e=>{e.stopPropagation();if(!isAdded)addAccord(accord);}} style={{ flexShrink:0, width:22, height:22, borderRadius:"50%", background:isAdded?"#86EFAC":c.dot, border:"none", cursor:isAdded?"default":"pointer", display:"flex", alignItems:"center", justifyContent:"center", marginLeft:6, marginTop:2 }}>
                          {isAdded?<CheckIcon size={11} color="white"/>:<PlusIcon size={11} color="white"/>}
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* CENTER */}
          <div style={{ flex:1, display:"flex", flexDirection:"column", minWidth:0 }}>
            <div style={{ padding:"16px 24px", background:"white", borderBottom:"1px solid #EEF0F4", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:"0 1px 8px rgba(0,0,0,0.04)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                {editingName?(
                  <input ref={nameRef} value={buildName} onChange={e=>setBuildName(e.target.value)} onBlur={()=>setEditingName(false)} onKeyDown={e=>e.key==="Enter"&&setEditingName(false)} style={{ fontSize:18, fontWeight:700, color:"#1E293B", border:"none", borderBottom:"2px solid #6366F1", outline:"none", background:"none", fontFamily:"'Playfair Display',Georgia,serif", fontStyle:"italic", minWidth:200 }}/>
                ):(
                  <h1 onClick={()=>setEditingName(true)} style={{ fontSize:18, fontWeight:600, color:"#1E293B", margin:0, cursor:"text", fontFamily:"'Playfair Display',Georgia,serif", fontStyle:"italic", letterSpacing:"-0.01em" }}>{buildName}</h1>
                )}
                {selected.length>0&&(
                  <span style={{ fontSize:11, fontWeight:600, color:"#6B7280", background:"#F1F5F9", borderRadius:20, padding:"2px 10px" }}>
                    {selected.length} material{selected.length!==1?"s":""} · <span style={{ color:totalLoad>50?"#F59E0B":"#10B981" }}>~{totalLoad.toFixed(0)}% load</span>
                  </span>
                )}
                {hasIfraWarning&&<span style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#EF4444", fontWeight:600 }}><AlertIcon size={12} color="#EF4444"/> IFRA warning</span>}
              </div>
              <button onClick={handleSend} disabled={!selected.length} style={{ display:"flex", alignItems:"center", gap:6, background:sent?"#10B981":"#1E293B", color:"white", border:"none", padding:"9px 18px", borderRadius:10, cursor:selected.length?"pointer":"not-allowed", fontSize:13, fontWeight:600, opacity:selected.length?1:0.4, transition:"background 0.2s" }}>
                {sent?<><CheckIcon size={14} color="white"/> Sent!</>:<><SparklesIcon size={14} color="white"/> Send to Lab</>}
              </button>
            </div>

            <CompositionSummary selected={selected}/>

            <div style={{ flex:1, overflowY:"auto", padding:"0 20px 24px" }}>
              {!selected.length?(
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"60%", gap:12, opacity:0.5 }}>
                  <div style={{ fontSize:32 }}>🧪</div>
                  <div style={{ fontSize:14, color:"#94A3B8", fontWeight:500 }}>Search and add materials to begin</div>
                  <div style={{ fontSize:11, color:"#CBD5E1" }}>{INGREDIENTS.length} materials · {ACCORDS.length} accords available</div>
                </div>
              ):(
                ZONES.map(zone=>{
                  const items=zoneGroups[zone];
                  if (!items.length) return null;
                  return (
                    <div key={zone} style={{ marginBottom:20 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, paddingBottom:6, borderBottom:`2px solid ${ZONE_COLORS[zone]}` }}>
                        <span style={{ width:8, height:8, borderRadius:"50%", background:ZONE_DOT[zone] }}/>
                        <span style={{ fontSize:11, fontWeight:700, color:ZONE_DOT[zone], letterSpacing:"0.06em", textTransform:"uppercase" }}>{ZONE_LABELS[zone]} notes</span>
                        <span style={{ fontSize:10, color:"#CBD5E1" }}>({items.length})</span>
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                        {items.map(ing=>(
                          <div key={ing.id} style={{ display:"flex", alignItems:"center", gap:12, background:familyColor(ing.family).bg, padding:"12px 14px", borderRadius:12, border:`1px solid ${familyColor(ing.family).dot}28`, borderLeft:`3px solid ${familyColor(ing.family).dot}`, boxShadow:"0 1px 4px rgba(0,0,0,0.03)" }}>
                            <div style={{ minWidth:140, maxWidth:140 }}>
                              <div style={{ display:"flex", alignItems:"center", gap:5, marginBottom:3 }}>
                                {ing.isAccord&&<span style={{ fontSize:9, fontWeight:800, color:"white", background:familyColor(ing.family).dot, borderRadius:4, padding:"1px 5px", flexShrink:0 }}>#{ing.accordNum}</span>}
                                <div style={{ fontSize:13, fontWeight:600, color:"#1E293B", letterSpacing:"-0.01em", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{ing.isAccord?ing.name.replace(`#${ing.accordNum} `,""):ing.name}</div>
                              </div>
                              <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                                <FamilyChip family={ing.family}/>
                                {!ing.isAccord&&ing.ifra!==null&&<span style={{ fontSize:9, color:"#94A3B8" }}>lim {ing.ifra}%</span>}
                              </div>
                              {ing.isAccord&&ing.descriptor&&<div style={{ fontSize:9, color:"#94A3B8", marginTop:2, lineHeight:1.3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{ing.descriptor}</div>}
                            </div>
                            <StrengthBar value={ing.strength} onChange={v=>updateStrength(ing.id,v)} ifraLimit={ing.ifra}/>
                            <ZoneBadge zone={ing.zone} onChange={z=>updateZone(ing.id,z)}/>
                            <button onClick={()=>removeIngredient(ing.id)} style={{ width:24, height:24, borderRadius:"50%", background:"#FEE2E2", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }} onMouseOver={e=>e.currentTarget.style.background="#FECACA"} onMouseOut={e=>e.currentTarget.style.background="#FEE2E2"}>
                              <XIcon size={11} color="#EF4444"/>
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>

          {/* RIGHT */}
          <ScentProfile selected={selected}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ScentEngine/>);
  </script>
</body>
</html>
